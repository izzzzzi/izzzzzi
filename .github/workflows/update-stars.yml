name: Update Stars

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update star counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          declare -A REPOS
          REPOS["opencode-hashline"]="izzzzzi/opencode-hashline"
          REPOS["agent-assh"]="izzzzzi/agent-assh"
          REPOS["agent-aget"]="izzzzzi/agent-aget"
          REPOS["agent-asearch"]="izzzzzi/agent-asearch"
          REPOS["izTeamSlots"]="izzzzzi/izTeamSlots"
          REPOS["codewiki-mcp"]="izzzzzi/codewiki-mcp"
          REPOS["opencode-gemini-business"]="izzzzzi/opencode-gemini-business"
          REPOS["izTolkMcp"]="izzzzzi/izTolkMcp"
          REPOS["pi-goal-pro"]="izzzzzi/pi-goal-pro"

          for SHORT in "${!REPOS[@]}"; do
            FULL="${REPOS[$SHORT]}"
            STARS=$(gh api "repos/$FULL" --jq '.stargazers_count' 2>/dev/null)
            if [ -z "$STARS" ] || [ "$STARS" = "null" ]; then
              echo "⚠️  $FULL — no stars"
              continue
            fi
            echo "⭐ $FULL → $STARS"

            python3 -c "
import re
with open('README.md') as f:
    content = f.read()
pattern = r'(\[' + re.escape('$SHORT') + r'\]\([^)]+\) \| )⭐\d+( \|)'
replacement = r'\1⭐$STARS\2'
new_content = re.sub(pattern, replacement, content)
if new_content != content:
    with open('README.md', 'w') as f:
        f.write(new_content)
    print('  ✓ updated')
else:
    print('  - already current')
"
          done

      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update repo star counts [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
