name: Update Stars

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update star counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching stars..."
          for repo in \
            izzzzzi/opencode-hashline \
            izzzzzi/agent-assh \
            izzzzzi/agent-aget \
            izzzzzi/agent-asearch \
            izzzzzi/izTeamSlots \
            izzzzzi/codewiki-mcp \
            izzzzzi/opencode-gemini-business \
            izzzzzi/izTolkMcp \
            izzzzzi/pi-goal-pro
          do
            stars=$(gh api "repos/$repo" --jq '.stargazers_count')
            short="${repo#*/}"
            echo "$short → $stars ⭐"

            python3 <<PYEOF
import re
with open('README.md') as f:
    content = f.read()
pattern = r'(\[' + re.escape('$short') + r'\]\([^)]+\) \| )⭐\d+( \|)'
replacement = r'\1⭐$stars\2'
new_content = re.sub(pattern, replacement, content)
if new_content != content:
    with open('README.md', 'w') as f:
        f.write(new_content)
    print('  ✓ $short updated')
else:
    print('  - $short already current')
PYEOF
          done
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update repo star counts [skip ci]"
            git push
          else
            echo "No changes"
          fi
