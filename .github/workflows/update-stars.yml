name: Update Stars
on:
  schedule:
    - cron: 0 6 * * *
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and update star counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          for repo in \
            izzzzzi/opencode-hashline \
            izzzzzi/agent-assh \
            izzzzzi/agent-aget \
            izzzzzi/agent-asearch \
            izzzzzi/izTeamSlots \
            izzzzzi/codewiki-mcp \
            izzzzzi/opencode-gemini-business \
            izzzzzi/izTolkMcp \
            izzzzzi/pi-goal-pro
          do
            stars=$(gh api "repos/$repo" --jq '.stargazers_count')
            short="${repo#*/}"
            echo "$short → $stars"
            sed -i "/$short/ s/⭐[0-9]*/⭐$stars/" README.md
          done
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update repo star counts [skip ci]"
            git push
          else
            echo "No changes"
          fi
